<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 1 ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:linear-gradient(135deg,#ffd6e7,#fff0f5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
}

h1{
    color:#ff3b7d;
    margin-bottom:10px;
}

p{
    color:#555;
    text-align:center;
    max-width:400px;
}

input{
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #ff4d88;
    outline:none;
    width:120px;
    text-align:center;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:#ff4d88;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff1f6b;
}

#msg{
    margin-top:20px;
    font-size:18px;
    color:#444;
}

#reward{
    display:none;
    margin-top:25px;
    padding:20px;
    background:white;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    color:#ff3b7d;
    font-size:20px;
}

.heart{
    position:absolute;
    color:#ff4d88;
    animation:float 6s linear infinite;
}

@keyframes float{
    0%{transform:translateY(100vh);opacity:0;}
    20%{opacity:1;}
    100%{transform:translateY(-10vh);opacity:0;}
}

</style>

</head>

<body>

<h1>🎮 Juego 1: Adivina mi pensamiento ❤️</h1>

<p>
Estoy pensando en un número del 1 al 10...  
Si lo adivinas, tienes una sorpresa especial 💝
</p>

<input type="number" id="guess" min="1" max="10">
<button onclick="check()">Intentar ❤️</button>

<div id="msg"></div>

<div id="reward">
🎁 ¡Felicidades mi amor! 🎁<br><br>
Adivinaste mi pensamiento...<br>
Tu recompensa es: <b>Un abrazo infinito mío ❤️</b>
</div>

<script>

const secret = Math.floor(Math.random()*10)+1;

function check(){

let value = parseInt(document.getElementById("guess").value);

let msg = document.getElementById("msg");

if(!value){
msg.innerHTML="Escribe un número mi amor ❤️";
return;
}

if(value === secret){

msg.innerHTML="💖 ¡Lo lograste! Eres mi persona favorita 💖";
document.getElementById("reward").style.display="block";
createHearts();

}else if(value < secret){

msg.innerHTML="⬆️ Más alto mi amorcito ❤️";

}else{

msg.innerHTML="⬇️ Más bajo amor mío ❤️";

}

}

function createHearts(){

setInterval(()=>{

const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(15+Math.random()*20)+"px";
document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

},200);

}

</script>

</body>
</html>
